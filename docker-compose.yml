services:
  postgres:
    image: postgres:16-alpine
    container_name: sangue-doce-postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: sangue-doce
      POSTGRES_PASSWORD: sangue-doce
      POSTGRES_DB: sangue-doce
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sangue-doce -d sangue-doce"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
