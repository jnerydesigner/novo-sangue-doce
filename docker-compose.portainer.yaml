services:
  postgres:
    image: postgres:16-alpine
    container_name: sangue-doce-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - sangue_doce_internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: sangue-doce-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "${MINIO_API_PORT:-9610}:9000"
      - "${MINIO_CONSOLE_PORT:-9611}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    networks:
      - sangue_doce_internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  minio-init:
    image: minio/mc:latest
    container_name: sangue-doce-minio-init
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - sangue_doce_internal
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: ${MINIO_BUCKET:-sangue-doce}
      MINIO_PUBLIC_PREFIX: ${MINIO_PUBLIC_PREFIX:-public}
    entrypoint: >
      /bin/sh -c '
      mc alias set local http://minio:9000 "$${MINIO_ROOT_USER}" "$${MINIO_ROOT_PASSWORD}";
      mc mb --ignore-existing local/"$${MINIO_BUCKET}";
      mc anonymous set private local/"$${MINIO_BUCKET}";
      mc anonymous set download local/"$${MINIO_BUCKET}"/"$${MINIO_PUBLIC_PREFIX}";
      '

  migrate:
    image: ${BACKEND_IMAGE:-jandernery/sangue-doce-backend:latest}
    container_name: sangue-doce-migrate
    restart: "no"
    command: ["./node_modules/.bin/prisma", "migrate", "deploy"]
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - sangue_doce_internal

  backend:
    image: ${BACKEND_IMAGE:-jandernery/sangue-doce-backend:latest}
    container_name: sangue-doce-backend
    restart: unless-stopped
    ports:
      - "${SERVER_PORT:-3011}:3011"
    environment:
      NODE_ENV: production
      SERVER_PORT: 3011
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      JWT_SECRET: ${JWT_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_CALLBACK_URL: ${GOOGLE_CALLBACK_URL:-https://api.sanguedoce.seligadev.com.br/auth/google/callback}
      FRONTEND_URL: ${FRONTEND_URL:-https://sanguedoce.seligadev.com.br}
      URL_SITE: ${URL_SITE:-https://sanguedoce.seligadev.com.br}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: ${MINIO_BUCKET:-sangue-doce}
      MINIO_PUBLIC_PREFIX: ${MINIO_PUBLIC_PREFIX:-public}
      MINIO_ENDPOINT: minio
      MINIO_API_PORT: 9000
      MINIO_CONSOLE_PORT: 9001
      MINIO_USE_SSL: "false"
      MINIO_REGION: ${MINIO_REGION:-us-east-1}
      MINIO_PUBLIC_URL: ${MINIO_PUBLIC_URL:-http://minio:9000}
      MINIO_PUBLIC_PATH: ${MINIO_PUBLIC_PATH:-/sangue-doce/public}
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    networks:
      - sangue_doce_internal

  frontend:
    image: ${FRONTEND_IMAGE:-jandernery/sangue-doce-frontend:latest}
    container_name: sangue-doce-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3010}:3010"
    environment:
      NODE_ENV: production
      PORT: 3010
      HOSTNAME: 0.0.0.0
      INTERNAL_API_URL: ${FRONTEND_INTERNAL_API_URL:-http://backend:3011}
      NEXT_PUBLIC_API_URL: ${FRONTEND_API_URL:-https://api.sanguedoce.seligadev.com.br}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://sanguedoce.seligadev.com.br}
      NEXT_IMAGE_UNOPTIMIZED: ${NEXT_IMAGE_UNOPTIMIZED:-true}
      NEXT_PUBLIC_MINIO_PUBLIC_URL: ${NEXT_PUBLIC_MINIO_PUBLIC_URL:-http://minio:9000}
      NEXT_PUBLIC_MINIO_PUBLIC_PATH: ${NEXT_PUBLIC_MINIO_PUBLIC_PATH:-/sangue-doce/public}
      NEXT_PUBLIC_BRAND_LOGO_PATH: ${NEXT_PUBLIC_BRAND_LOGO_PATH:-/sangue-doce-logo.png}
      NEXT_PUBLIC_GOOGLE_AUTH_ENABLED: ${NEXT_PUBLIC_GOOGLE_AUTH_ENABLED:-false}
      MINIO_INTERNAL_PUBLIC_URL: ${MINIO_INTERNAL_PUBLIC_URL:-http://minio:9000}
      MINIO_PUBLIC_PATH: ${MINIO_PUBLIC_PATH:-/sangue-doce/public}
      AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE:-false}
    depends_on:
      backend:
        condition: service_started
    networks:
      - sangue_doce_internal

networks:
  sangue_doce_internal:
    name: sangue-doce-portainer-internal

volumes:
  postgres_data:
  minio_data:
