name: Frontend Docker Hub

on:
  push:
    branches:
      - main
      - master
    tags:
      - "frontend-v*"
      - "v*"
    paths:
      - "front-sangue-doce/**"
      - ".github/workflows/frontend-dockerhub.yml"
  pull_request:
    paths:
      - "front-sangue-doce/**"
      - ".github/workflows/frontend-dockerhub.yml"
  workflow_dispatch:

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/sangue-doce-frontend
  NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL || 'http://localhost:3011' }}
  NEXT_PUBLIC_SITE_URL: ${{ vars.NEXT_PUBLIC_SITE_URL || 'http://localhost:3010' }}
  NEXT_IMAGE_UNOPTIMIZED: ${{ vars.NEXT_IMAGE_UNOPTIMIZED || 'false' }}
  NEXT_PUBLIC_MINIO_PUBLIC_URL: ${{ vars.NEXT_PUBLIC_MINIO_PUBLIC_URL || 'http://localhost:9610' }}
  NEXT_PUBLIC_MINIO_PUBLIC_PATH: ${{ vars.NEXT_PUBLIC_MINIO_PUBLIC_PATH || '/sangue-doce/public' }}

jobs:
  build:
    name: Build and publish frontend image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-
            type=ref,event=branch
            type=ref,event=tag

      - name: Login to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./front-sangue-doce
          file: ./front-sangue-doce/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ env.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_SITE_URL=${{ env.NEXT_PUBLIC_SITE_URL }}
            NEXT_IMAGE_UNOPTIMIZED=${{ env.NEXT_IMAGE_UNOPTIMIZED }}
            NEXT_PUBLIC_MINIO_PUBLIC_URL=${{ env.NEXT_PUBLIC_MINIO_PUBLIC_URL }}
            NEXT_PUBLIC_MINIO_PUBLIC_PATH=${{ env.NEXT_PUBLIC_MINIO_PUBLIC_PATH }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
