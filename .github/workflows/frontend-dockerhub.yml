name: Frontend Docker Hub

on:
  push:
    branches:
      - main
      - master
    tags:
      - "frontend-v*"
      - "v*"
    paths:
      - "front-sangue-doce/**"
      - ".github/workflows/frontend-dockerhub.yml"
  pull_request:
    paths:
      - "front-sangue-doce/**"
      - ".github/workflows/frontend-dockerhub.yml"
  workflow_dispatch:

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/sangue-doce-frontend
  NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL || 'http://localhost:3011' }}
  NEXT_PUBLIC_SITE_URL: ${{ vars.NEXT_PUBLIC_SITE_URL || 'http://localhost:3010' }}
  NEXT_IMAGE_UNOPTIMIZED: ${{ vars.NEXT_IMAGE_UNOPTIMIZED || 'false' }}
  NEXT_PUBLIC_MINIO_PUBLIC_URL: ${{ vars.NEXT_PUBLIC_MINIO_PUBLIC_URL || 'http://localhost:9610' }}
  NEXT_PUBLIC_MINIO_PUBLIC_PATH: ${{ vars.NEXT_PUBLIC_MINIO_PUBLIC_PATH || '/sangue-doce/public' }}
  NEXT_PUBLIC_BRAND_LOGO_PATH: ${{ vars.NEXT_PUBLIC_BRAND_LOGO_PATH || '/sangue-doce-logo.png' }}
  NEXT_PUBLIC_GOOGLE_AUTH_ENABLED: ${{ vars.NEXT_PUBLIC_GOOGLE_AUTH_ENABLED || 'false' }}

jobs:
  build:
    name: Build and publish frontend image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-
            type=ref,event=branch
            type=ref,event=tag

      - name: Login to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ./front-sangue-doce
          file: ./front-sangue-doce/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ env.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_SITE_URL=${{ env.NEXT_PUBLIC_SITE_URL }}
            NEXT_IMAGE_UNOPTIMIZED=${{ env.NEXT_IMAGE_UNOPTIMIZED }}
            NEXT_PUBLIC_MINIO_PUBLIC_URL=${{ env.NEXT_PUBLIC_MINIO_PUBLIC_URL }}
            NEXT_PUBLIC_MINIO_PUBLIC_PATH=${{ env.NEXT_PUBLIC_MINIO_PUBLIC_PATH }}
            NEXT_PUBLIC_BRAND_LOGO_PATH=${{ env.NEXT_PUBLIC_BRAND_LOGO_PATH }}
            NEXT_PUBLIC_GOOGLE_AUTH_ENABLED=${{ env.NEXT_PUBLIC_GOOGLE_AUTH_ENABLED }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy frontend image to VPS
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    concurrency:
      group: sangue-doce-production-deploy
      cancel-in-progress: false

    steps:
      - name: Configure SSH
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT || '22' }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$VPS_PORT" "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Pull and restart stack
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT || '22' }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_APP_DIR: ${{ vars.VPS_APP_DIR || '/opt/sangue-doce' }}
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes -p "$VPS_PORT" "$VPS_USER@$VPS_HOST" "APP_DIR='$VPS_APP_DIR' bash -s" <<'EOF'
          set -euo pipefail
          cd "$APP_DIR"

          docker compose --env-file .env.stack.portainer -f docker-compose.portainer.yaml pull frontend backend
          docker compose --env-file .env.stack.portainer -f docker-compose.portainer.yaml up -d postgres minio
          docker compose --env-file .env.stack.portainer -f docker-compose.portainer.yaml run --rm migrate
          docker compose --env-file .env.stack.portainer -f docker-compose.portainer.yaml up -d --force-recreate backend frontend
          docker image prune -f
          EOF
