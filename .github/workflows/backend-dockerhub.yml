name: Backend Docker Hub
# Trigger-only update for Docker Hub workflow.

on:
  push:
    branches:
      - main
      - master
    tags:
      - "backend-v*"
      - "v*"
    paths:
      - "back-sangue-doce/**"
      - "recipe-importer/**"
      - "docker-compose.portainer.yaml"
      - ".github/workflows/backend-dockerhub.yml"
  pull_request:
    paths:
      - "back-sangue-doce/**"
      - "recipe-importer/**"
      - "docker-compose.portainer.yaml"
      - ".github/workflows/backend-dockerhub.yml"
  workflow_dispatch:

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/sangue-doce-backend
  RECIPE_IMPORTER_IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/sangue-doce-recipe-importer

jobs:
  build:
    name: Build and publish backend image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-
            type=ref,event=branch
            type=ref,event=tag

      - name: Recipe importer Docker metadata
        id: recipe-importer-meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.RECIPE_IMPORTER_IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-
            type=ref,event=branch
            type=ref,event=tag

      - name: Login to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ./back-sangue-doce
          file: ./back-sangue-doce/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push recipe importer
        uses: docker/build-push-action@v7
        with:
          context: ./recipe-importer
          file: ./recipe-importer/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.recipe-importer-meta.outputs.tags }}
          labels: ${{ steps.recipe-importer-meta.outputs.labels }}
          cache-from: type=gha,scope=recipe-importer
          cache-to: type=gha,mode=max,scope=recipe-importer

  deploy:
    name: Deploy backend image to VPS
    runs-on: [self-hosted, Linux, X64]
    needs: build
    if: github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    concurrency:
      group: sangue-doce-production-deploy
      cancel-in-progress: false

    steps:
      - name: Checkout deployment files
        uses: actions/checkout@v5

      - name: Sync stack and deployment environment
        env:
          VPS_APP_DIR: ${{ vars.VPS_APP_DIR || '/opt/sangue-doce' }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_AUTHOR_URN: ${{ secrets.LINKEDIN_AUTHOR_URN }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ vars.AWS_REGION }}
          AWS_S3_REGION: ${{ vars.AWS_S3_REGION }}
          AWS_S3_BUCKET: ${{ vars.AWS_S3_BUCKET }}
          LLM_IMAGE_MODEL: ${{ vars.LLM_IMAGE_MODEL }}
          LLM_IMAGE_QUALITY: ${{ vars.LLM_IMAGE_QUALITY }}
          LLM_IMAGE_TIMEOUT_MS: ${{ vars.LLM_IMAGE_TIMEOUT_MS }}
          LLM_TEXT_MODEL: ${{ vars.LLM_TEXT_MODEL }}
          LLM_TEXT_TIMEOUT_MS: ${{ vars.LLM_TEXT_TIMEOUT_MS }}
          LINKEDIN_API_VERSION: ${{ vars.LINKEDIN_API_VERSION }}
          PATH_TO_UPLOADS: ${{ vars.PATH_TO_UPLOADS }}
          PATH_TO_UPLOADS_MEDIA: ${{ vars.PATH_TO_UPLOADS_MEDIA }}
          NEXT_PUBLIC_AWS_S3_PUBLIC_URL: ${{ vars.NEXT_PUBLIC_AWS_S3_PUBLIC_URL }}
        run: |
          set -euo pipefail
          install -m 644 docker-compose.portainer.yaml "$VPS_APP_DIR/docker-compose.portainer.yaml"
          export DEPLOY_ENV_FILE="$VPS_APP_DIR/.env.stack.portainer"
          python3 - <<'PY'
          import os
          from pathlib import Path

          path = Path(os.environ["DEPLOY_ENV_FILE"])
          lines = path.read_text().splitlines() if path.exists() else []
          updates = {
              key: value
              for key, value in os.environ.items()
              if key in {
                  "ANTHROPIC_API_KEY", "OPENAI_API_KEY", "LINKEDIN_ACCESS_TOKEN",
                  "LINKEDIN_AUTHOR_URN", "RESEND_API_KEY", "AWS_ACCESS_KEY_ID",
                  "AWS_SECRET_ACCESS_KEY", "AWS_REGION", "AWS_S3_REGION", "AWS_S3_BUCKET",
                  "LLM_IMAGE_MODEL", "LLM_IMAGE_QUALITY", "LLM_IMAGE_TIMEOUT_MS",
                  "LLM_TEXT_MODEL", "LLM_TEXT_TIMEOUT_MS", "LINKEDIN_API_VERSION",
                  "PATH_TO_UPLOADS", "PATH_TO_UPLOADS_MEDIA", "NEXT_PUBLIC_AWS_S3_PUBLIC_URL",
              } and value
          }
          found = set()
          output = []
          for line in lines:
              key = line.split("=", 1)[0] if "=" in line else ""
              if key in updates:
                  output.append(f"{key}={updates[key]}")
                  found.add(key)
              else:
                  output.append(line)
          output.extend(f"{key}={value}" for key, value in updates.items() if key not in found)
          path.write_text("\n".join(output) + "\n")
          PY

      - name: Pull and restart stack
        env:
          VPS_APP_DIR: ${{ vars.VPS_APP_DIR || '/opt/sangue-doce' }}
        run: |
          set -euo pipefail
          cd "$VPS_APP_DIR"

          docker compose --env-file .env.stack.portainer -f docker-compose.portainer.yaml pull backend frontend recipe-importer
          docker compose --env-file .env.stack.portainer -f docker-compose.portainer.yaml up -d postgres minio redis
          docker compose --env-file .env.stack.portainer -f docker-compose.portainer.yaml run --rm migrate
          docker compose --env-file .env.stack.portainer -f docker-compose.portainer.yaml up -d --force-recreate --wait recipe-importer
          docker compose --env-file .env.stack.portainer -f docker-compose.portainer.yaml up -d --force-recreate backend frontend
          docker image prune -f
