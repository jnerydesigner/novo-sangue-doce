name: Backend Docker Hub
# Trigger-only update for Docker Hub workflow.

on:
  push:
    branches:
      - main
      - master
    tags:
      - "backend-v*"
      - "v*"
    paths:
      - "back-sangue-doce/**"
      - ".github/workflows/backend-dockerhub.yml"
  pull_request:
    paths:
      - "back-sangue-doce/**"
      - ".github/workflows/backend-dockerhub.yml"
  workflow_dispatch:

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/sangue-doce-backend

jobs:
  build:
    name: Build and publish backend image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-
            type=ref,event=branch
            type=ref,event=tag

      - name: Login to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ./back-sangue-doce
          file: ./back-sangue-doce/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy backend image to VPS
    runs-on: [self-hosted, Linux, X64]
    needs: build
    if: github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    concurrency:
      group: sangue-doce-production-deploy
      cancel-in-progress: false

    steps:
      - name: Pull and restart stack
        env:
          VPS_APP_DIR: ${{ vars.VPS_APP_DIR || '/opt/sangue-doce' }}
        run: |
          set -euo pipefail
          cd "$VPS_APP_DIR"

          docker compose --env-file .env.stack.portainer -f docker-compose.portainer.yaml pull backend frontend
          docker compose --env-file .env.stack.portainer -f docker-compose.portainer.yaml up -d postgres minio
          docker compose --env-file .env.stack.portainer -f docker-compose.portainer.yaml run --rm migrate
          docker compose --env-file .env.stack.portainer -f docker-compose.portainer.yaml up -d --force-recreate backend frontend
          docker image prune -f
